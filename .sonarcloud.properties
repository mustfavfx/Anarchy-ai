# SonarCloud Automatic Analysis Configuration
# More info: https://docs.sonarcloud.io/advanced-setup/automatic-analysis/

# Analyzing only production sources
sonar.sources=src

# Exclude generated directories, build artifacts, rust source, and test results from analysis
sonar.exclusions=node_modules/**,dist/**,playwright-report/**,test-results/**,src-tauri/**,.venv/**,*.config.js,setup_dist/**,anarchy_audit/**

# Test folder definition
sonar.tests=tests
sonar.test.inclusions=tests/**/*.ts,tests/**/*.tsx,src/**/*.test.ts,src/**/*.test.tsx

name: 'Publish Release'

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.7.1)'
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: npm install

      - name: Clean Signing Key
        shell: bash
        run: |
          CLEANED_KEY=$(echo -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | tr -d '\r\n[:space:]')
          echo "TAURI_SIGNING_PRIVATE_KEY=$CLEANED_KEY" >> $GITHUB_ENV

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Anarchy AI v__VERSION__'
          releaseBody: |
            ## What's New
            
            🚀 New features and improvements in this release.
            
            ### Installation
            - Download the installer for your platform
            - Run the installer
            - The app will auto-update in future releases
            
            ### Notes
            - Windows: Use the `.msi` or `.exe` installer
            - macOS: Use the `.dmg` for Intel or Apple Silicon
            - Linux: Use the `.AppImage` or `.deb` package
          releaseDraft: false
          prerelease: false

  create-update-json:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM=${VERSION#v}
          
          cat > latest.json << EOF
          {
            "version": "${VERSION_NUM}",
            "notes": "See full release notes at https://github.com/${{ github.repository }}/releases/tag/${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/anarchy-ai_${VERSION_NUM}_x64-setup.exe"
              }
            }
          }
          EOF
          
          cat latest.json
      
      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

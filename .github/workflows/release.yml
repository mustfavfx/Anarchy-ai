name: 'Publish Release'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.7.1)'
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: npm install

      - name: Clean Signing Key
        shell: bash
        run: |
          CLEANED_KEY=$(echo -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | tr -d '\r\n[:space:]')
          echo "TAURI_SIGNING_PRIVATE_KEY=$CLEANED_KEY" >> $GITHUB_ENV

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://ejzsbkxpqmhpjuqmszvd.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqenNia3hwcW1ocGp1cW1zenZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjEzNjIsImV4cCI6MjA5MzE5NzM2Mn0.lbKXt_BLTNXjTKpmqdPLvU6vC-mWNjbVRYjfSGFVZcc' }}
        with:
          tagName: v__VERSION__
          releaseName: 'Anarchy AI v__VERSION__'
          releaseBody: |
            ## What's New
            
            🚀 New features and improvements in this release.
            
            ### Installation
            - Download the installer for your platform
            - Run the installer
            - The app will auto-update in future releases
            
            ### Notes
            - Windows: Use the `.msi` or `.exe` installer
            - macOS: Use the `.dmg` for Intel or Apple Silicon
            - Linux: Use the `.AppImage` or `.deb` package
          releaseDraft: false
          prerelease: false



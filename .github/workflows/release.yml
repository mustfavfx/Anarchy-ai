name: 'Publish Release'

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.7.1)'
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Anarchy AI v__VERSION__'
          releaseBody: |
            ## What's New
            
            🚀 New features and improvements in this release.
            
            ### Installation
            - Download the installer for your platform
            - Run the installer
            - The app will auto-update in future releases
            
            ### Notes
            - Windows: Use the `.msi` or `.exe` installer
            - macOS: Use the `.dmg` for Intel or Apple Silicon
            - Linux: Use the `.AppImage` or `.deb` package
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  create-update-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM=${VERSION#v}
          
          cat > latest.json << EOF
          {
            "version": "${VERSION_NUM}",
            "notes": "See full release notes at https://github.com/${{ github.repository }}/releases/tag/${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/anarchy-ai_${VERSION_NUM}_aarch64.dmg"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/anarchy-ai_${VERSION_NUM}_x64.dmg"
              },
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/anarchy-ai_${VERSION_NUM}_amd64.AppImage"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/anarchy-ai_${VERSION_NUM}_x64-setup.exe"
              }
            }
          }
          EOF
          
          cat latest.json
      
      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
